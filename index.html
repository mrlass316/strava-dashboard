      /* Heatmap scroll */
      .heatmap-scroll { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
      /* Cards: reduce padding */

      /* Recharts containers — slightly shorter on mobile */
      .recharts-responsive-container { min-height: 180px; }
      /* Shoe projection grid → stack */
      .shoe-stats { grid-template-columns: 1fr !important; gap: 6px !important; }
      /* HR zones pie + legend → stack */
      .hr-zones-grid { grid-template-columns: 1fr !important; }
      /* Metric cards: 2-column on narrow */
      .metric-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
    /* Extra small (< 380px, like iPhone SE) */

      .main-container { padding: 8px !important; }
      .title-name { font-size: 1rem !important; }
      .metric-grid { grid-template-columns: 1fr !important; }

    }

    @media (display-mode: standalone) {
      body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    }

        foot: <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><path d="M4 16v-2.38C4 11.5 2.97 10.5 3 8c.03-2.72 1.49-6 4.5-6C9.37 2 10 3.8 10 5.5c0 3.11-2 5.66-2 8.68V16a2 2 0 1 1-4 0Z"/><path d="M20 20v-2.38c0-2.12 1.03-3.12 1-5.62-.03-2.72-1.49-6-4.5-6C14.63 6 14 7.8 14 9.5c0 3.11 2 5.66 2 8.68V20a2 2 0 1 0 4 0Z"/></svg>,
        dumbbell: <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><path d="m6.5 6.5 11 11"/><path d="m21 21-1-1"/><path d="m3 3 1 1"/><path d="m18 22 4-4"/><path d="m2 6 4-4"/><path d="m3 10 7-7"/><path d="m14 21 7-7"/></svg>,
        bike: <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><circle cx="18.5" cy="17.5" r="3.5"/><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="15" cy="5" r="1"/><path d="M12 17.5V14l-3-3 4-3 2 3h2"/></svg>,
        target: <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,
        gauge: <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><path d="m12 14 4-4"/><path d="M3.34 19a10 10 0 1 1 17.32 0"/></svg>,
        sparkles: <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>,
        arrowUp: <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><path d="m7 7 10 10"/><path d="M17 7v10"/></svg>,
        arrowDown: <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><path d="m7 17 10-10"/><path d="M17 17V7"/></svg>,
        check: <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
        alert: <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" x2="12" y1="9" y2="13"/><line x1="12" x2="12.01" y1="17" y2="17"/></svg>,
        battery: <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><rect width="16" height="10" x="2" y="7" rx="2" ry="2"/><line x1="22" x2="22" y1="11" y2="13"/></svg>,
        minus: <svg style={s} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><line x1="5" x2="19" y1="12" y2="12"/></svg>,
      };
      return icons[type] || null;
    };

    // ═══════════════════════════════════════════════════════════════
    // MAIN COMPONENT
    // ═══════════════════════════════════════════════════════════════
    function StravaDashboard() {
      const [tab, setTab] = useState("daily");
      const [period, setPeriod] = useState("ytd");

      const now = new Date(); // Siempre usa la fecha real del sistema

      const data = useMemo(() => {
        return RAW.filter(a => {
          const d = new Date(a.d);
          if (period === "30d") return (now - d) / 864e5 <= 30;
          if (period === "90d") return (now - d) / 864e5 <= 90;
          if (period === "ytd") return d.getFullYear() === 2026;
          if (period === "2025") return d.getFullYear() === 2025;
          return true;
        });
      }, [period]);

      const runs = useMemo(() => data.filter(a => a.t === "Run" && a.km > 0), [data]);
      const weights = useMemo(() => data.filter(a => a.t === "WeightTraining"), [data]);
      const rides = useMemo(() => data.filter(a => a.t === "Ride"), [data]);

      // Weekly aggregates
      const weeklyAgg = useMemo(() => {
        const weeks = {};
        runs.forEach(a => {
          const d = new Date(a.d);
          const ws = new Date(d); ws.setDate(d.getDate() - d.getDay());
          const k = ws.toISOString().split("T")[0];
          if (!weeks[k]) weeks[k] = { w: k, km: 0, runs: 0, sec: 0, el: 0, cal: 0, paces: [], hrs: [], watts: [] };
          weeks[k].km += a.km; weeks[k].runs++; weeks[k].sec += a.s;
          weeks[k].el += a.el; weeks[k].cal += (a.cal || 0);
          if (a.p > 0 && a.p < 10) weeks[k].paces.push(a.p);
          if (a.hr > 0) weeks[k].hrs.push(a.hr);
          if (a.w > 0) weeks[k].watts.push(a.w);
        });
        return Object.values(weeks).map(w => ({
          ...w,
          avgPace: w.paces.length ? w.paces.reduce((a,b)=>a+b,0)/w.paces.length : 0,
          avgHr: w.hrs.length ? w.hrs.reduce((a,b)=>a+b,0)/w.hrs.length : 0,
          avgWatts: w.watts.length ? w.watts.reduce((a,b)=>a+b,0)/w.watts.length : 0,
          label: (() => { const d = new Date(w.w); return `${d.getDate()}/${d.getMonth()+1}`; })()
        })).sort((a,b) => a.w.localeCompare(b.w));
      }, [runs]);

      // Monthly aggregates
      const monthlyAgg = useMemo(() => {
        const m = {};
        runs.forEach(a => {
          const k = getMonthKey(a.d);
          if (!m[k]) m[k] = { m: k, km: 0, runs: 0, sec: 0, cal: 0, paces: [], hrs: [], watts: [] };
          m[k].km += a.km; m[k].runs++; m[k].sec += a.s; m[k].cal += (a.cal || 0);
          if (a.p > 0 && a.p < 10) m[k].paces.push(a.p);
          if (a.hr > 0) m[k].hrs.push(a.hr);
          if (a.w > 0) m[k].watts.push(a.w);
        });
        return Object.values(m).map(v => ({
          ...v,
          avgPace: v.paces.length ? v.paces.reduce((a,b)=>a+b,0)/v.paces.length : 0,
          avgHr: v.hrs.length ? v.hrs.reduce((a,b)=>a+b,0)/v.hrs.length : 0,
          avgWatts: v.watts.length ? v.watts.reduce((a,b)=>a+b,0)/v.watts.length : 0,
          label: (() => { const [y,mo] = v.m.split("-"); return `${MONTHS[parseInt(mo)-1]} ${y.slice(2)}`; })()
        })).sort((a,b) => a.m.localeCompare(b.m));
      }, [runs]);

      // Training Load (TRIMP)
      const trainingLoad = useMemo(() => {
        return weeklyAgg.map(w => {
          const hrFactor = w.avgHr > 0 ? (w.avgHr - ATHLETE.restHr) / (ATHLETE.maxHr - ATHLETE.restHr) : 0.6;
          const trimp = (w.sec / 60) * hrFactor * 1.5;
          return { ...w, trimp: Math.round(trimp), hrFactor };
        });
      }, [weeklyAgg]);

      // Fitness / Fatigue / Form
      const fitnessModel = useMemo(() => {
        if (trainingLoad.length < 2) return [];
        const result = [];
        let ctl = 0, atl = 0;
        trainingLoad.forEach((w) => {
          ctl = ctl + (w.trimp - ctl) / 6;
          atl = atl + (w.trimp - atl) / 1.2;
          const tsb = ctl - atl;
          result.push({
            ...w, fitness: Math.round(ctl), fatigue: Math.round(atl), form: Math.round(tsb),
            formStatus: tsb > 15 ? "peak" : tsb > 0 ? "fresh" : tsb > -15 ? "optimal" : "tired"
          });
        });
        return result;
      }, [trainingLoad]);

      // VO2max
      const vo2max = useMemo(() => {
        const dist = 10000; const time = 48;
        const v = dist / time;
        const num = -4.60 + 0.182258 * v + 0.000104 * v * v;
        const den = 0.8 + 0.1894393 * Math.exp(-0.012778 * time) + 0.2989558 * Math.exp(-0.1932605 * time);
        return Math.round(num / den * 10) / 10;
      }, []);

      // HR Zone distribution
      const energySystem = useMemo(() => {
        let z1=0,z2=0,z3=0,z4=0,z5=0;
        runs.forEach(a => {
          if (a.hr <= 0) { z2 += a.s; return; }
          if (a.hr < 124) z1 += a.s; else if (a.hr < 154) z2 += a.s;
          else if (a.hr < 169) z3 += a.s; else if (a.hr < 184) z4 += a.s; else z5 += a.s;
        });
        const total = z1+z2+z3+z4+z5||1;
        return [
          {name:"Z1 Recovery",value:Math.round(z1/total*100),seconds:z1,color:"#6b7280"},
          {name:"Z2 Aerobic",value:Math.round(z2/total*100),seconds:z2,color:"#3b82f6"},
          {name:"Z3 Tempo",value:Math.round(z3/total*100),seconds:z3,color:"#10b981"},
          {name:"Z4 Threshold",value:Math.round(z4/total*100),seconds:z4,color:"#f59e0b"},
          {name:"Z5 VO2max",value:Math.round(z5/total*100),seconds:z5,color:"#ef4444"}
        ];
      }, [runs]);

      const aerobicPct = useMemo(() => {
        return energySystem.filter(z=>["Z1 Recovery","Z2 Aerobic","Z3 Tempo"].includes(z.name)).reduce((s,z)=>s+z.value,0);
      }, [energySystem]);

      // Pace trend
      const paceTrend = useMemo(() => {
        return weeklyAgg.map((w,i) => {
          const slice = weeklyAgg.slice(Math.max(0,i-3),i+1);
          const avg = slice.filter(s=>s.avgPace>0).reduce((a,b)=>a+b.avgPace,0)/Math.max(slice.filter(s=>s.avgPace>0).length,1);
          return {...w, rollingPace:avg, rawPace:w.avgPace};
        });
      }, [weeklyAgg]);

      // Efficiency
      const efficiency = useMemo(() => {
        return runs.filter(a=>a.hr>0&&a.p>0&&a.p<10).map(a=>({
          date:a.d, speed:60/a.p, hr:a.hr, efficiency:(60/a.p)/a.hr*100, watts:a.w, km:a.km,
          label:(()=>{const d=new Date(a.d);return `${d.getDate()}/${d.getMonth()+1}`;})()
        })).sort((a,b)=>a.date.localeCompare(b.date));
      }, [runs]);

      // Heatmap
      const heatmap = useMemo(() => { const m={}; data.forEach(a=>{m[a.d]=(m[a.d]||0)+1;}); return m; }, [data]);

      // Streaks
      const streaks = useMemo(() => {
        const dates = [...new Set(data.map(a=>a.d))].sort();
        let max=0,cur=0,prev=null;
        dates.forEach(d=>{const c=new Date(d);if(prev&&(c-prev)/864e5<=1)cur++;else cur=1;if(cur>max)max=cur;prev=c;});
        return {max,current:cur};
      }, [data]);

      // KPIs
      const kpi = useMemo(() => {
        const totalKm=runs.reduce((s,a)=>s+a.km,0);
        const totalTime=data.reduce((s,a)=>s+a.s,0);
        const totalCal=data.reduce((s,a)=>s+(a.cal||0),0);
        const totalElev=runs.reduce((s,a)=>s+a.el,0);
        const paces=runs.filter(a=>a.p>0&&a.p<10).map(a=>a.p);
        const avgPace=paces.length?paces.reduce((a,b)=>a+b,0)/paces.length:0;
        const hrs=runs.filter(a=>a.hr>0).map(a=>a.hr);
        const avgHr=hrs.length?hrs.reduce((a,b)=>a+b,0)/hrs.length:0;
        const wts=runs.filter(a=>a.w>0).map(a=>a.w);
        const avgWatts=wts.length?wts.reduce((a,b)=>a+b,0)/wts.length:0;
        return {totalKm,totalTime,totalCal,totalElev,avgPace,avgHr,avgWatts,runCount:runs.length,totalAct:data.length};
      }, [data,runs]);

      // Week comparison
      const weekComp = useMemo(() => {
        const tw=new Date(now);tw.setDate(now.getDate()-now.getDay());
        const lw=new Date(tw);lw.setDate(tw.getDate()-7);
        const thisW=runs.filter(a=>new Date(a.d)>=tw);
        const lastW=runs.filter(a=>{const d=new Date(a.d);return d>=lw&&d<tw;});
        return {thisKm:thisW.reduce((s,a)=>s+a.km,0),thisRuns:thisW.length,lastKm:lastW.reduce((s,a)=>s+a.km,0),lastRuns:lastW.length};
      }, [runs]);

      // Current form
      const currentForm = useMemo(() => {
        if (fitnessModel.length===0) return {status:"\u2014",fitness:0,fatigue:0,form:0};
        return fitnessModel[fitnessModel.length-1];
      }, [fitnessModel]);

      // Coach insights
      const insights = useMemo(() => {
        const r = [];
        if (weeklyAgg.length >= 8) {
          const recent4=weeklyAgg.slice(-4), prev4=weeklyAgg.slice(-8,-4);
          const rAvg=recent4.reduce((s,w)=>s+w.km,0)/4, pAvg=prev4.reduce((s,w)=>s+w.km,0)/4;
          const pct=((rAvg/pAvg)-1)*100;
          if(pct>10) r.push({type:"warning",icon:"trendUp",color:N.orange,title:`Volumen +${fmt(pct,0)}%`,text:`Promedio semanal ${fmt(rAvg)}km vs ${fmt(pAvg)}km anterior. Cuidado con sobreentrenamiento.`});
          else if(pct<-10) r.push({type:"info",icon:"trendDown",color:N.blue,title:`Volumen ${fmt(pct,0)}%`,text:"Posible semana de descarga. Tu cuerpo se recupera."});
          else r.push({type:"good",icon:"check",color:N.green,title:"Volumen estable",text:`Consistente en ~${fmt(rAvg)}km/semana. Excelente progresión.`});
        }
        if (paceTrend.length >= 8) {
          const rp=paceTrend.slice(-4).filter(p=>p.rollingPace>0);
          const op=paceTrend.slice(-8,-4).filter(p=>p.rollingPace>0);
          if(rp.length&&op.length){
            const rv=rp.reduce((s,p)=>s+p.rollingPace,0)/rp.length;
            const ov=op.reduce((s,p)=>s+p.rollingPace,0)/op.length;
            if(rv<ov-0.05) r.push({type:"good",icon:"zap",color:N.green,title:"Pace mejorando",text:`${fmtPace(rv)} vs ${fmtPace(ov)}/km. Tu sistema aeróbico se adapta.`});
            else if(rv>ov+0.1) r.push({type:"warning",icon:"alert",color:N.yellow,title:"Pace más lento",text:`${fmtPace(rv)} vs ${fmtPace(ov)}/km. Posible fatiga acumulada.`});
          }
        }
        if(currentForm.form!==undefined){
          const f=currentForm.form;
          if(f>10) r.push({type:"good",icon:"sparkles",color:N.cyan,title:"Forma óptima",text:`TSB de +${f}. Estás fresco para competir.`});
          else if(f>-5) r.push({type:"info",icon:"target",color:N.blue,title:"En construcción",text:`TSB de ${f}. Buen balance carga/recuperación.`});
          else r.push({type:"warning",icon:"battery",color:N.red,title:"Fatiga alta",text:`TSB de ${f}. Considera reducir volumen 20-30%.`});
        }
        if(aerobicPct>75) r.push({type:"good",icon:"heart",color:N.green,title:`Base aeróbica: ${aerobicPct}%`,text:"Excelente distribución. 80/20 es el estándar de élite."});
        else r.push({type:"warning",icon:"heart",color:N.orange,title:`Base aeróbica: ${aerobicPct}%`,text:"Intenta más carreras en Z2. La regla 80/20 mejora rendimiento."});
        return r;
      }, [weeklyAgg,paceTrend,currentForm,aerobicPct]);

      // Distance distribution
      const distDist = useMemo(() => {
        const b=[{name:"<5K",min:0,max:5,c:0,color:N.cyan},{name:"5-10K",min:5,max:10,c:0,color:N.blue},{name:"10-15K",min:10,max:15,c:0,color:N.green},{name:"15-21K",min:15,max:21,c:0,color:N.purple},{name:"21K+",min:21,max:999,c:0,color:N.orange}];
        runs.forEach(a=>{const bucket=b.find(x=>a.km>=x.min&&a.km<x.max);if(bucket)bucket.c++;});
        return b.map(x=>({name:x.name,value:x.c,color:x.color}));
      }, [runs]);

      // Day distribution
      const dayDist = useMemo(() => {
        const d=[0,0,0,0,0,0,0];
        runs.forEach(a=>d[new Date(a.d).getDay()]++);
        return ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"].map((n,i)=>({day:n,count:d[i]}));
      }, [runs]);

      // Radar
      const radarData = useMemo(() => {
        const recent=weeklyAgg.slice(-4);
        const avgKm=recent.reduce((s,w)=>s+w.km,0)/Math.max(recent.length,1);
        const avgRuns=recent.reduce((s,w)=>s+w.runs,0)/Math.max(recent.length,1);
        return [
          {subject:"Volumen",A:Math.min(avgKm/80*100,100)},
          {subject:"Frecuencia",A:Math.min(avgRuns/6*100,100)},
          {subject:"Velocidad",A:Math.min((7-kpi.avgPace)/3*100,100)},
          {subject:"Resistencia",A:Math.min(kpi.totalKm/800*100,100)},
          {subject:"Potencia",A:Math.min(kpi.avgWatts/280*100,100)},
          {subject:"Consistencia",A:Math.min(streaks.max/10*100,100)}
        ];
      }, [weeklyAgg,kpi,streaks]);

      // ═══════════════════════════════════════════════════
      // RENDER HELPERS
      // ═══════════════════════════════════════════════════
      const Card = ({children,className="",glow,onClick}) => (
        <div onClick={onClick} className={`rounded-2xl border transition-all duration-500 ${onClick?"cursor-pointer hover:scale-105":""} ${className}`}
          style={{background:"rgba(17,24,39,0.8)",backdropFilter:"blur(8px)",borderColor:"rgba(55,65,81,0.5)",
            ...(glow?{boxShadow:`0 0 40px ${glow}15, 0 0 80px ${glow}08`}:{})}}>
          {children}
        </div>
      );

      const Metric = ({label,value,sub,iconType,color=N.cyan,large}) => (
        <Card className="p-4" glow={color}>
          <div className="flex items-center gap-2 mb-2">
            {iconType && <div className="p-1.5 rounded-lg" style={{background:`${color}18`}}><Icon type={iconType} size={14} color={color}/></div>}
            <span style={{color:"#9ca3af",fontSize:"0.75rem"}}>{label}</span>
          </div>
          <p className={`font-bold text-white ${large?"text-3xl":"text-xl"}`}>{value}</p>
          {sub && <p style={{fontSize:"0.625rem",color:"#6b7280",marginTop:2}}>{sub}</p>}
        </Card>
      );

      const TT = ({active,payload,label}) => {
        if(!active||!payload?.length) return null;
        return (
          <div style={{background:"rgba(17,24,39,0.95)",backdropFilter:"blur(8px)",border:"1px solid #374151",borderRadius:12,padding:12,boxShadow:"0 25px 50px rgba(0,0,0,0.5)"}}>
            <p style={{color:"#9ca3af",fontSize:"0.625rem",marginBottom:4}}>{label}</p>
            {payload.map((p,i)=><p key={i} style={{fontSize:"0.75rem",fontWeight:500,color:p.color||p.stroke}}>{p.name}: {typeof p.value==="number"?fmt(p.value):p.value}</p>)}
          </div>
        );
      };

      const CoachTip = ({title, explain, action, color=N.cyan}) => (
        <div style={{background:"rgba(255,255,255,0.02)",borderRadius:12,padding:14,border:`1px solid ${color}20`,minWidth:200,display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <Icon type="sparkles" size={13} color={color}/>
            <span style={{fontSize:"0.7rem",fontWeight:700,color,textTransform:"uppercase",letterSpacing:"0.05em"}}>Coach</span>
          </div>
          <div>
            <p style={{fontSize:"0.75rem",fontWeight:700,color:"white",marginBottom:4}}>{title}</p>
            <p style={{fontSize:"0.675rem",color:"#9ca3af",lineHeight:1.5}}>{explain}</p>
          </div>
          <div style={{borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:8}}>
            <p style={{fontSize:"0.625rem",color:"#6b7280",marginBottom:2}}>PRÓXIMA SEMANA</p>
            <p style={{fontSize:"0.7rem",color:N.green,fontWeight:600}}>{action}</p>
          </div>
        </div>
      );

      const FormBadge = ({status}) => {
        const cfg = {
          peak:{color:N.green,bg:"#10b98118",label:"PEAK FORM",icon:"\uD83D\uDD25"},
          fresh:{color:N.cyan,bg:"#06b6d418",label:"FRESCO",icon:"\u2728"},
          optimal:{color:N.blue,bg:"#3b82f618",label:"ÓPTIMO",icon:"\uD83D\uDCAA"},
          tired:{color:N.red,bg:"#ef444418",label:"FATIGADO",icon:"\uD83D\uDE2E\u200D\uD83D\uDCA8"}
        }[status]||{color:N.blue,bg:"#3b82f618",label:status,icon:"\uD83C\uDFC3"};
        return <span style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 12px",borderRadius:9999,fontSize:"0.75rem",fontWeight:700,letterSpacing:"0.05em",color:cfg.color,backgroundColor:cfg.bg,border:`1px solid ${cfg.color}30`}}><span>{cfg.icon}</span> {cfg.label}</span>;
      };

      // Heatmap
      const HeatmapGrid = () => {
        const weeks=[];
        const start=new Date("2026-01-01"), end=new Date("2026-04-21");
        let cur=new Date(start);cur.setDate(cur.getDate()-cur.getDay());
        while(cur<=end){
          const week=[];
          for(let i=0;i<7;i++){const dd=new Date(cur);dd.setDate(cur.getDate()+i);const k=dd.toISOString().split("T")[0];week.push({date:k,count:heatmap[k]||0,in:dd>=start&&dd<=end});}
          weeks.push(week);cur.setDate(cur.getDate()+7);
        }
        const gc=(c)=>c===0?"#111827":c===1?"#064e3b":c===2?"#059669":"#10b981";
        return (
          <div className="heatmap-scroll" style={{overflowX:"auto",WebkitOverflowScrolling:"touch",paddingBottom:4}}>
            <div style={{display:"flex",gap:3,minWidth:"max-content"}}>
              {weeks.map((w,wi)=>(
                <div key={wi} style={{display:"flex",flexDirection:"column",gap:3}}>
                  {w.map((d,di)=>(
                    <div key={di} title={`${d.date}: ${d.count} actividades`}
                      style={{width:13,height:13,borderRadius:3,backgroundColor:d.in?gc(d.count):"transparent",transition:"all 0.2s"}}/>
                  ))}
                </div>
              ))}
            </div>
          </div>
        );
      };

      const tabs = [
        {id:"daily",label:"Diario",icon:"calendar"},
        {id:"overview",label:"Overview",icon:"barChart"},
        {id:"coaching",label:"Coach",icon:"target"},
        {id:"running",label:"Running",icon:"foot"},
        {id:"fitness",label:"Fitness",icon:"heart"},
        {id:"other",label:"Gym & Más",icon:"dumbbell"},
        {id:"consistency",label:"Consistencia",icon:"calendar"},
        {id:"shoes",label:"Tenis",icon:"foot"}
      ];

      // ═══════════════════════════════════════════════════
      // RENDER
      // ═══════════════════════════════════════════════════
      return (
        <div className="main-container" style={{minHeight:"100vh",color:"white",padding:"24px",fontFamily:"'Inter',system-ui,sans-serif",background:"linear-gradient(135deg,#0a0a0f 0%,#0d1117 50%,#0a0f1a 100%)",maxWidth:1200,margin:"0 auto"}}>

          {/* HEADER */}
          <div className="header-wrap" style={{display:"flex",flexWrap:"wrap",alignItems:"center",justifyContent:"space-between",marginBottom:24,gap:16}}>
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              <div style={{position:"relative"}}>
                <div style={{position:"absolute",inset:0,borderRadius:16,background:"linear-gradient(135deg,#06b6d4,#a855f7)",filter:"blur(16px)",opacity:0.5}}/>
                <div style={{position:"relative",width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#06b6d4,#a855f7)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:900,color:"white"}}>LS</div>
              </div>
              <div>
                <h1 className="title-name" style={{fontSize:"1.5rem",fontWeight:900,letterSpacing:"-0.025em",background:"linear-gradient(135deg,#06b6d4,#a855f7,#ec4899)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{ATHLETE.name}</h1>
                <div style={{display:"flex",alignItems:"center",gap:8,marginTop:2,flexWrap:"wrap"}}>
                  <span style={{color:"#6b7280",fontSize:"0.75rem"}}>{ATHLETE.weight}kg · Strava desde {ATHLETE.joined}</span>
                  <FormBadge status={currentForm.formStatus||"optimal"}/>
                </div>
              </div>
            </div>
            <div className="period-btns" style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {[["30d","30D"],["90d","90D"],["ytd","2026"],["2025","2025"],["all","ALL"]].map(([v,l])=>(
                <button key={v} onClick={()=>setPeriod(v)}
                  style={{padding:"8px 14px",borderRadius:8,fontSize:"0.75rem",fontWeight:700,letterSpacing:"0.05em",border:period===v?"1px solid rgba(255,255,255,0.2)":"1px solid transparent",background:period===v?"rgba(255,255,255,0.1)":"transparent",color:period===v?"white":"#6b7280",cursor:"pointer",transition:"all 0.2s"}}>
                  {l}
                </button>
              ))}
            </div>
          </div>

          {/* TABS */}
          <div className="scrollbar-hide tab-bar" style={{display:"flex",gap:4,marginBottom:24,overflowX:"auto",paddingBottom:8,WebkitOverflowScrolling:"touch"}}>
            {tabs.map(({id,label,icon:ic})=>(
              <button key={id} onClick={()=>setTab(id)}
                style={{display:"flex",alignItems:"center",gap:6,padding:"10px 14px",borderRadius:12,fontSize:"0.8rem",fontWeight:600,whiteSpace:"nowrap",border:tab===id?"1px solid rgba(255,255,255,0.15)":"1px solid transparent",background:tab===id?"rgba(255,255,255,0.1)":"transparent",color:tab===id?"white":"#6b7280",cursor:"pointer",transition:"all 0.2s"}}>
                <Icon type={ic} size={14}/> {label}
              </button>
            ))}
          </div>

          {/* ═══════ DIARIO ═══════ */}
          {tab==="daily" && (()=>{
            const DAYS_ES = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
            const DAYS_SHORT = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

            // Get start of current week (Monday)
            const weekStart = new Date(now);
            const dayOfWeek = weekStart.getDay();
            weekStart.setDate(weekStart.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
            weekStart.setHours(0,0,0,0);
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekStart.getDate() + 6);

            // Previous week
            const prevWeekStart = new Date(weekStart);
            prevWeekStart.setDate(weekStart.getDate() - 7);
            const prevWeekEnd = new Date(weekStart);
            prevWeekEnd.setDate(weekStart.getDate() - 1);

            // All activities this week
            const weekActivities = data.filter(a => {
              const ad = new Date(a.d);
              return ad >= weekStart && ad <= now;
            }).sort((a,b) => b.d.localeCompare(a.d));

            // Previous week activities
            const prevWeekActivities = data.filter(a => {
              const ad = new Date(a.d);
              return ad >= prevWeekStart && ad < weekStart;
            });

            // Group by day
            const dayMap = {};
            for (let i = 0; i < 7; i++) {
              const d = new Date(weekStart);
              d.setDate(weekStart.getDate() + i);
              const key = d.toISOString().split("T")[0];
              dayMap[key] = { date: key, dayName: DAYS_ES[d.getDay()], dayShort: DAYS_SHORT[d.getDay()], activities: [], isPast: d <= now, isToday: d.toDateString() === now.toDateString() };
            }
            weekActivities.forEach(a => { if (dayMap[a.d]) dayMap[a.d].activities.push(a); });
            const weekDays = Object.values(dayMap);

            // Yesterday's activities
            const yesterday = new Date(now);
            yesterday.setDate(now.getDate() - 1);
            const yesterdayStr = yesterday.toISOString().split("T")[0];
            const todayStr = now.toISOString().split("T")[0];
            // Use most recent day with activities
            const recentDay = weekDays.filter(d => d.activities.length > 0).sort((a,b) => b.date.localeCompare(a.date))[0];
            const featuredActivities = recentDay ? recentDay.activities : [];
            const featuredDate = recentDay ? recentDay.date : todayStr;
            const featuredDayName = recentDay ? recentDay.dayName : "";

            // Week stats
            const wkRuns = weekActivities.filter(a => a.t === "Run");
            const wkGym = weekActivities.filter(a => a.t === "WeightTraining");
            const wkKm = wkRuns.reduce((s,a) => s + a.km, 0);
            const wkTime = weekActivities.reduce((s,a) => s + a.s, 0);
            const wkCal = weekActivities.reduce((s,a) => s + (a.cal||0), 0);
            const wkAvgPace = wkRuns.filter(a=>a.p>0).length ? wkRuns.filter(a=>a.p>0).reduce((s,a)=>s+a.p,0)/wkRuns.filter(a=>a.p>0).length : 0;
            const wkAvgHr = wkRuns.filter(a=>a.hr>0).length ? wkRuns.filter(a=>a.hr>0).reduce((s,a)=>s+a.hr,0)/wkRuns.filter(a=>a.hr>0).length : 0;
            const wkAvgWatts = wkRuns.filter(a=>a.w>0).length ? wkRuns.filter(a=>a.w>0).reduce((s,a)=>s+a.w,0)/wkRuns.filter(a=>a.w>0).length : 0;

            // Previous week stats for comparison
            const pwRuns = prevWeekActivities.filter(a => a.t === "Run");
            const pwKm = pwRuns.reduce((s,a) => s + a.km, 0);
            const kmDiff = pwKm > 0 ? ((wkKm - pwKm) / pwKm * 100) : 0;

            // Coach analysis helpers
            const getHrZone = (hr) => {
              if (hr <= 0) return null;
              const z = ATHLETE.hrZones.find(z => hr >= z.min && hr < z.max);
              return z || ATHLETE.hrZones[ATHLETE.hrZones.length-1];
            };

            const getRunType = (a) => {
              if (a.p <= 0) return "Run";
              if (a.km >= 18) return "Long Run";
              if (a.km >= 12) return "Medio Largo";
              if (a.p < 5.2) return "Intervalos / Velocidad";
              if (a.p < 5.6) return "Tempo Run";
              if (a.p < 6.2) return "Run Moderado";
              return "Run Fácil / Recovery";
            };

            const getCoachNote = (a) => {
              if (a.t === "WeightTraining") {
                const mins = Math.round(a.s/60);
                if (mins > 60) return {emoji:"💪", note:"Sesión de fuerza completa. Buen complemento para running.", tip:"Hidrátate bien y estira después del gym."};
                if (mins > 30) return {emoji:"🏋️", note:"Sesión de fuerza moderada. Fortaleces la cadena posterior.", tip:"Enfócate en sentadillas y lunges para transferir al running."};
                return {emoji:"⚡", note:"Sesión corta de activación o movilidad.", tip:"Perfecto para días de recuperación activa."};
              }
              const zone = getHrZone(a.hr);
              const zName = zone ? zone.name.split(" ")[0] : "";
              if (a.km >= 18) return {emoji:"🏆", note:`Long run de ${fmt(a.km)}km a pace ${fmtPace(a.p)}. Excelente para resistencia aeróbica y adaptación mitocondrial.`, tip:`Recuperación: ${a.hr > 160 ? "48h sin intensidad. Fue un esfuerzo alto." : "24h fácil. Buen control de intensidad."}`};
              if (a.km >= 12) return {emoji:"📏", note:`Medio largo de ${fmt(a.km)}km en ${zName}. Construcción de volumen sólida.`, tip:a.hr > 165 ? "El HR estuvo alto para esta distancia. Intenta mantener Z2 en los largos." : "Buen control cardíaco. Estás construyendo base aeróbica."};
              if (a.p < 5.2 && a.p > 0) return {emoji:"🔥", note:`Sesión rápida a ${fmtPace(a.p)}/km. Trabajo de velocidad que mejora tu VO2max.`, tip:"Recuperación activa mañana: trote suave 30min o descanso total."};
              if (a.p < 5.6 && a.p > 0) return {emoji:"⚡", note:`Tempo run a ${fmtPace(a.p)}/km. Mejora tu umbral de lactato.`, tip:"Próximo día: run fácil en Z2 para asimilar el estímulo."};
              if (a.p >= 6.2 || (a.hr > 0 && a.hr < 155)) return {emoji:"🧘", note:`Run fácil a ${fmtPace(a.p)}/km en zona aeróbica baja. Perfecto para recuperación.`, tip:"Este tipo de runs son la base del 80% fácil. Sigue así."};
              return {emoji:"🏃", note:`Run de ${fmt(a.km)}km a ${fmtPace(a.p)}/km${a.hr>0?` con FC ${Math.round(a.hr)} bpm (${zName})`:""}.`, tip:"Mantén la variedad de estímulos entre sesiones."};
            };

            // Day-of-week context (0=Mon..6=Sun)
            const dayIdx = dayOfWeek === 0 ? 6 : dayOfWeek - 1; // Mon=0, Tue=1, ..., Sun=6
            const daysElapsed = dayIdx + 1;
            const daysRemaining = 7 - daysElapsed;
            const isEarlyWeek = dayIdx <= 2; // Mon-Wed
            const isMidWeek = dayIdx >= 3 && dayIdx <= 4; // Thu-Fri
            const isLateWeek = dayIdx >= 5; // Sat-Sun
            const dayNameToday = DAYS_ES[now.getDay()];

            // Project weekly volume based on current pace
            const kmPerDayRate = daysElapsed > 0 ? wkKm / daysElapsed : 0;
            const projectedKm = wkKm + (kmPerDayRate * daysRemaining);

            // Average weekly km from previous 4 weeks for context
            const prev4w = [];
            for (let wi = 1; wi <= 4; wi++) {
              const ws = new Date(weekStart); ws.setDate(weekStart.getDate() - wi*7);
              const we = new Date(ws); we.setDate(ws.getDate() + 6);
              const wRuns = data.filter(a => { const ad = new Date(a.d); return a.t==="Run" && ad >= ws && ad <= we; });
              prev4w.push(wRuns.reduce((s,a) => s+a.km, 0));
            }
            const avgWeeklyKm = prev4w.length ? prev4w.reduce((s,v)=>s+v,0)/prev4w.length : 0;

            const getWeekCoachSummary = () => {
              const notes = [];

              // Volume analysis — context-aware by day
              if (isEarlyWeek) {
                // Mon-Wed: project forward, don't judge final volume
                if (wkKm > 30) notes.push({icon:"🔥",title:`Arranque fuerte: ${fmt(wkKm)}km`,text:`Llevas ${fmt(wkKm)}km en solo ${daysElapsed} días (${dayNameToday}). Proyección: ~${fmt(projectedKm)}km. ${projectedKm > 50 ? "Ojo con la sobrecarga — modera los próximos días." : "Vas a buen ritmo."}`});
                else if (wkKm > 15) notes.push({icon:"💪",title:`Buen inicio: ${fmt(wkKm)}km`,text:`En ${daysElapsed} días llevas ${fmt(wkKm)}km. Proyección: ~${fmt(projectedKm)}km. ${avgWeeklyKm > 0 ? `Tu promedio semanal es ~${fmt(avgWeeklyKm)}km.` : ""} Vas encaminado.`});
                else if (wkKm > 0) notes.push({icon:"📊",title:`${fmt(wkKm)}km hasta hoy`,text:`Es ${dayNameToday}, aún quedan ${daysRemaining} días. ${avgWeeklyKm > 0 ? `Para alcanzar tu promedio de ~${fmt(avgWeeklyKm)}km necesitas ~${fmt(Math.max(avgWeeklyKm - wkKm, 0))}km más.` : "Hay tiempo de sobra para sumar volumen."}`});
                else notes.push({icon:"🌱",title:"Semana arrancando",text:`Es ${dayNameToday} y aún no hay carreras. ${daysRemaining} días por delante. ${avgWeeklyKm > 0 ? `Tu promedio es ~${fmt(avgWeeklyKm)}km/semana — hoy es buen día para empezar.` : "Buen momento para planificar tus sesiones."}`});
              } else if (isMidWeek) {
                // Thu-Fri: evaluate progress with projection
                if (wkKm > 35) notes.push({icon:"🔥",title:`Semana productiva: ${fmt(wkKm)}km`,text:`Llevas ${fmt(wkKm)}km al ${dayNameToday}. ${daysRemaining > 0 ? `Con ${daysRemaining} días restantes, proyectas ~${fmt(projectedKm)}km.` : ""} ${wkKm > avgWeeklyKm ? "Ya superaste tu promedio semanal." : "Cerca de tu promedio."}`});
                else if (wkKm > 20) notes.push({icon:"💪",title:`En camino: ${fmt(wkKm)}km`,text:`${dayNameToday} con ${fmt(wkKm)}km. ${avgWeeklyKm > 0 ? `Faltan ~${fmt(Math.max(avgWeeklyKm - wkKm, 0))}km para tu promedio de ${fmt(avgWeeklyKm)}km.` : `Quedan ${daysRemaining} días para sumar.`} Un long run el fin de semana completaría bien.`});
                else notes.push({icon:"📊",title:`Semana baja: ${fmt(wkKm)}km`,text:`Es ${dayNameToday} y llevas ${fmt(wkKm)}km. ${daysRemaining > 0 ? `Aprovecha el fin de semana: un long run de 12-15km compensaría.` : ""}`});
              } else {
                // Sat-Sun: near-final summary
                if (wkKm > 45) notes.push({icon:"🏆",title:`Semana excepcional: ${fmt(wkKm)}km`,text:`Gran volumen. ${daysRemaining > 0 ? `Si falta el domingo, hazlo suave o descansa.` : "Cierre completo."} La próxima semana considera descargar.`});
                else if (wkKm > 30) notes.push({icon:"💪",title:`Buena semana: ${fmt(wkKm)}km`,text:`Volumen sólido. ${avgWeeklyKm > 0 && wkKm >= avgWeeklyKm ? "Alcanzaste o superaste tu promedio." : "Consistente con tu ritmo habitual."} ${daysRemaining > 0 ? "Si corres mañana, hazlo fácil para cerrar bien." : ""}`});
                else if (wkKm > 15) notes.push({icon:"📊",title:`Semana moderada: ${fmt(wkKm)}km`,text:`Volumen por debajo de lo habitual${avgWeeklyKm > 0 ? ` (promedio: ${fmt(avgWeeklyKm)}km)` : ""}. ${daysRemaining > 0 ? "Un run largo mañana sumaría." : "Puede ser semana de recuperación — está bien."}`});
                else notes.push({icon:"🌱",title:`Semana ligera: ${fmt(wkKm)}km`,text:`Poco volumen${avgWeeklyKm > 0 ? ` vs tu promedio de ${fmt(avgWeeklyKm)}km` : ""}. ${wkRuns.length === 0 ? "Semana de descanso total." : "Fue una semana de recuperación — tu cuerpo lo agradece."}`});
              }

              // Intensity mix — only evaluate if enough runs to judge
              const easyRuns = wkRuns.filter(a => a.p >= 5.8 || (a.hr > 0 && a.hr < 158));
              const hardRuns = wkRuns.filter(a => a.p < 5.6 && a.p > 0);
              const ratio = wkRuns.length > 0 ? Math.round(easyRuns.length / wkRuns.length * 100) : 0;
              if (wkRuns.length >= 3) {
                if (ratio >= 70) notes.push({icon:"✅",title:"Polarización correcta",text:`${ratio}% de tus runs son fáciles. Excelente distribución 80/20.`});
                else notes.push({icon:"⚠️",title:"Mucha intensidad",text:`Solo ${ratio}% de runs fáciles. ${isEarlyWeek ? "Aún puedes equilibrar con runs en Z2 el resto de la semana." : "Intenta más Z2 la próxima semana."}`});
              } else if (wkRuns.length > 0 && hardRuns.length === wkRuns.length) {
                notes.push({icon:"⚠️",title:"Todas las sesiones intensas",text:`${wkRuns.length} run(s) y ${wkRuns.length === hardRuns.length ? "todos" : "la mayoría"} fueron rápidos. ${isEarlyWeek ? "Balancea con runs fáciles los próximos días." : "Agrega variedad la próxima semana."}`});
              }

              // Strength training — aware of remaining days
              if (wkGym.length >= 2) notes.push({icon:"🏋️",title:`${wkGym.length} sesiones de gym`,text:"Excelente complemento. La fuerza previene lesiones y mejora economía de carrera."});
              else if (wkGym.length === 1) notes.push({icon:"💡",title:"1 sesión de gym",text:`${daysRemaining >= 2 ? "Tienes tiempo de agregar 1-2 sesiones más esta semana." : "Intenta 2-3 sesiones la próxima semana."} Fuerza + running = combo ganador.`});
              else if (daysElapsed >= 3) notes.push({icon:"🏋️",title:"Sin gym aún",text:`${daysRemaining >= 2 ? "Aún puedes meter 1-2 sesiones antes de que termine la semana." : "Planifica 2-3 sesiones de fuerza la próxima semana."} Sentadillas, lunges y plancha son clave.`});

              // Week vs previous week — only compare when week is >50% done
              if (pwKm > 0 && dayIdx >= 3) {
                // Compare with actual, but note the week isn't done if Sat/Sun remain
                const pctOfPrev = wkKm / pwKm * 100;
                if (pctOfPrev > 115) notes.push({icon:"📈",title:`+${fmt(pctOfPrev-100,0)}% vs semana anterior`,text:`${fmt(wkKm)}km vs ${fmt(pwKm)}km la semana pasada. ${isLateWeek ? "Cuidado con subir más del 10% semanal." : "Vas adelante — modera si lo necesitas."}`});
                else if (pctOfPrev < 75) notes.push({icon:"📉",title:`${fmt(pctOfPrev-100,0)}% vs semana anterior`,text:`${fmt(wkKm)}km vs ${fmt(pwKm)}km. ${daysRemaining > 0 ? `Aún quedan ${daysRemaining} días para acercarte.` : "Semana más suave — puede ser beneficioso."}`});
                else notes.push({icon:"➡️",title:"Volumen similar a la semana pasada",text:`${fmt(wkKm)}km vs ${fmt(pwKm)}km. Consistencia es clave para progresar.`});
              } else if (pwKm > 0 && isEarlyWeek) {
                // Early week: just give context, don't compare
                notes.push({icon:"📊",title:`Referencia: ${fmt(pwKm)}km la semana pasada`,text:`Tu promedio semanal es ~${fmt(avgWeeklyKm)}km. Vas por buen camino con ${fmt(wkKm)}km en ${daysElapsed} día(s).`});
              }

              return notes;
            };

            const getNextWeekRec = () => {
              const recs = [];
              // Use projected or average to recommend next week
              const refKm = isLateWeek ? wkKm : avgWeeklyKm > 0 ? avgWeeklyKm : projectedKm;

              if (isEarlyWeek) {
                // Still this week to plan — focus on remaining days
                recs.push(`Hoy es ${dayNameToday}. Quedan ${daysRemaining} días: planifica ${Math.min(daysRemaining, 3)} sesiones de running.`);
                if (wkRuns.length === 0) recs.push("Prioridad: un run fácil de 6-8km hoy para activar la semana.");
                else if (wkRuns.filter(a => a.p < 5.6 && a.p > 0).length > 0) recs.push("Ya hiciste intensidad. Los próximos runs deben ser fáciles en Z2.");
                else recs.push("Buen momento para 1 sesión de tempo o fartlek de 20-25min a mitad de semana.");
                if (wkGym.length === 0) recs.push("Mete 1-2 sesiones de fuerza antes del viernes.");
                recs.push("Reserva el long run (12-16km) para el fin de semana.");
              } else if (isMidWeek) {
                // Rest of this week + preview next
                if (daysRemaining > 0) recs.push(`Quedan ${daysRemaining} días: ${wkKm < avgWeeklyKm * 0.6 ? "un long run de 12-15km el sábado compensaría el volumen." : "cierra con 1-2 runs fáciles."}`);
                const nextTarget = refKm > 45 ? `~${fmt(refKm * 0.85)}km (descarga)` : `${fmt(refKm * 1.05)}-${fmt(refKm * 1.1)}km (+5-10%)`;
                recs.push(`Próxima semana objetivo: ${nextTarget}.`);
                recs.push("Incluye variedad: 1 sesión de intervalos, 1 tempo, y el resto fácil.");
              } else {
                // Weekend: full next-week plan
                const nextTarget = wkKm > 45 ? `~${fmt(wkKm * 0.85)}km (semana de descarga)` : `${fmt(Math.max(wkKm * 1.05, avgWeeklyKm))}–${fmt(Math.max(wkKm * 1.1, avgWeeklyKm * 1.05))}km`;
                recs.push(`Objetivo próxima semana: ${nextTarget}.`);
                if (wkKm > 45) {
                  recs.push("Máximo 1 sesión de tempo suave. El resto fácil en Z2.");
                } else {
                  recs.push("Plan: 1 intervalos (6×800m), 1 tempo (25min), 1-2 fáciles, 1 long run 14-16km.");
                }
                if (wkGym.length < 2) recs.push("Agrega 2 sesiones de fuerza (30-45min cada una).");
              }
              recs.push("Asegura 7-8 horas de sueño y buena hidratación.");
              return recs;
            };

            const weekCoachNotes = getWeekCoachSummary();
            const nextWeekRecs = getNextWeekRec();

            // PR check: most recent 10K PR
            const tenKPR = ATHLETE.bestEfforts["10K"];
            const tenKPRDate = new Date(tenKPR.date);
            const daysSincePR = Math.floor((now - tenKPRDate) / (1000*60*60*24));
            const showPRCelebration = daysSincePR <= 14 && tenKPR.date >= "2026-04-01";

            return (
            <div style={{display:"flex",flexDirection:"column",gap:20}}>

              {/* ── 🏆 HITO RECIENTE (PR celebration) ── */}
              {showPRCelebration && (
                <Card className="p-5" glow={N.yellow} style={{background:"linear-gradient(135deg,rgba(234,179,8,0.08),rgba(249,115,22,0.04))"}}>
                  <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14,flexWrap:"wrap"}}>
                    <div style={{width:48,height:48,borderRadius:14,background:"linear-gradient(135deg,#eab308,#f97316)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>🏆</div>
                    <div style={{flex:1,minWidth:0}}>
                      <h3 style={{fontSize:"1.05rem",fontWeight:900,color:"white"}}>¡Nuevo Récord Personal en 10K!</h3>
                      <p style={{fontSize:"0.7rem",color:"#fbbf24",marginTop:2}}>Domingo {tenKPR.date} · {fmtTime(tenKPR.time)} · {tenKPR.pace} · −2:54 vs PR anterior</p>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:14}}>

              const kmPerWeek = shoe.km / weeksUsed;
              const remaining = shoe.maxKm - shoe.km;
              const weeksToReplace = remaining / kmPerWeek;
              const replaceDate = new Date(now.getTime() + weeksToReplace * 7 * 864e5);
              const replaceDateStr = `${replaceDate.getDate()} ${MONTHS[replaceDate.getMonth()]} ${replaceDate.getFullYear()}`;

                            <span style={{fontSize:"0.625rem",padding:"4px 8px",borderRadius:9999,fontWeight:700,color:shoe.stc,backgroundColor:`${shoe.stc}15`,border:`1px solid ${shoe.stc}30`}}>{shoe.stl}</span>
                          </div>
                          <p style={{fontSize:"0.75rem",color:"#9ca3af",marginBottom:12}}>{shoe.km} km / {shoe.maxKm} km</p>
                          <div style={{height:12,background:"rgba(255,255,255,0.03)",borderRadius:9999,overflow:"hidden"}}>
                            <div style={{height:"100%",borderRadius:9999,width:`${shoe.pct}%`,background:`linear-gradient(90deg,${shoe.color},${shoe.stc})`,transition:"all 1s"}}/>
                          </div>
                          <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
                            <span style={{fontSize:"0.625rem",color:"#4b5563"}}>0 km</span>
                            <span style={{fontSize:"0.625rem",fontWeight:700,color:shoe.stc}}>{fmt(shoe.pct,0)}%</span>
                            <span style={{fontSize:"0.625rem",color:"#4b5563"}}>{shoe.maxKm} km</span>
                          </div>

                          {/* Projection info */}
                          <div style={{marginTop:16,padding:12,background:"rgba(255,255,255,0.03)",borderRadius:12,border:"1px solid rgba(255,255,255,0.05)"}}>
                            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                              <Icon type="calendar" size={12} color={shoe.color}/>
                              <span style={{fontSize:"0.75rem",fontWeight:700,color:"white"}}>Proyección de Reemplazo</span>
                            </div>
                            <div className="shoe-stats" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                              <div style={{textAlign:"center"}}>
                                <p style={{fontSize:"0.625rem",color:"#6b7280"}}>Uso semanal</p>
                                <p style={{fontSize:"1rem",fontWeight:900,color:shoe.color}}>{shoe.kmPerWeek} km</p>
                              </div>
                              <div style={{textAlign:"center"}}>
                                <p style={{fontSize:"0.625rem",color:"#6b7280"}}>Días restantes</p>
                                <p style={{fontSize:"1rem",fontWeight:900,color:shoe.daysToReplace<60?N.red:shoe.daysToReplace<120?N.yellow:N.green}}>{shoe.daysToReplace}</p>
                              </div>
                              <div style={{textAlign:"center"}}>
                                <p style={{fontSize:"0.625rem",color:"#6b7280"}}>Cambiar para</p>
                                <p style={{fontSize:"0.875rem",fontWeight:700,color:"white"}}>{shoe.replaceDateStr}</p>
                              </div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </Card>

              {/* Projection Chart */}
              <Card className="p-5" glow={N.purple}>
                <h3 style={{fontSize:"0.875rem",fontWeight:700,color:"#e5e7eb",marginBottom:12}}>Proyección de Desgaste</h3>
                <div className="coach-row" style={{display:"flex",gap:16,alignItems:"stretch"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <ResponsiveContainer width="100%" height={250}>
                      <ComposedChart data={(()=>{
                        const maxLen = Math.max(...shoeProjections.map(s=>s.projData.length));
                        const merged = [];
                        for(let j=0;j<maxLen;j++){
                          const entry = { label: shoeProjections[0].projData[j]?.label || "" };
                          shoeProjections.forEach((s,si)=>{
                            if(s.projData[j]) { entry[`shoe${si}`] = s.projData[j].km; }
                          });
                          entry.limit = 700;
                          merged.push(entry);
                        }
                        return merged;
                      })()}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#ffffff08"/>
                        <XAxis dataKey="label" tick={{fill:"#6b7280",fontSize:10}}/>
                        <YAxis tick={{fill:"#6b7280",fontSize:10}} domain={[0,750]}/>
                        <Tooltip content={({active,payload,label})=>{
                          if(!active||!payload?.length)return null;
                          return <div style={{background:"rgba(17,24,39,0.95)",border:"1px solid #374151",borderRadius:12,padding:12}}>
                            <p style={{fontSize:"0.625rem",color:"#9ca3af",marginBottom:4}}>{label}</p>
                            {payload.filter(p=>p.dataKey!=="limit").map((p,i)=><p key={i} style={{fontSize:"0.75rem",fontWeight:600,color:p.stroke||p.color}}>{shoeProjections[p.dataKey.replace("shoe","")]?.name.replace("ASICS Nimbus ","")}: {p.value} km</p>)}
                          </div>;
                        }}/>
                        <Line type="monotone" dataKey="limit" name="Límite 700km" stroke="#ef4444" strokeWidth={2} strokeDasharray="8 4" dot={false} opacity={0.6}/>
                        {shoeProjections.map((s,si)=>(
                          <Line key={si} type="monotone" dataKey={`shoe${si}`} name={s.name.replace("ASICS Nimbus ","")} stroke={s.color} strokeWidth={2.5} dot={{r:3,fill:s.color}}/>
                        ))}
                        <Legend formatter={v=><span style={{color:"#9ca3af",fontSize:"0.625rem"}}>{v}</span>}/>
                      </ComposedChart>
                    </ResponsiveContainer>
                    <p style={{fontSize:"0.625rem",color:"#6b7280",marginTop:4}}>Línea roja punteada = límite de vida útil (700 km)</p>
                  </div>
                  <CoachTip color={N.purple}
                    title={(() => { const soonest = shoeProjections.reduce((a,b) => a.daysToReplace < b.daysToReplace ? a : b); return soonest.daysToReplace < 60 ? "Reemplazo inminente" : soonest.daysToReplace < 120 ? "Planifica compra" : "Tenis en buen estado"; })()}
                    explain={(() => { const soonest = shoeProjections.reduce((a,b) => a.daysToReplace < b.daysToReplace ? a : b); return `"${soonest.name.replace("ASICS Nimbus ","")}" llega a 700km en ~${soonest.daysToReplace} días (${soonest.replaceDateStr}). Correr con tenis desgastados aumenta riesgo de lesiones.`; })()}
                    action={(() => { const soonest = shoeProjections.reduce((a,b) => a.daysToReplace < b.daysToReplace ? a : b); return soonest.daysToReplace < 90 ? `Compra reemplazo ya. Rota con los actuales las últimas semanas para adaptarte.` : `Sin prisa. Revisa el estado de la suela cada 100km y monitorea molestias.`; })()}
                  />
                </div>
              </Card>

              {/* Comparison bar chart */}
              <Card className="p-5">
                <h3 style={{fontSize:"0.875rem",fontWeight:700,color:"#e5e7eb",marginBottom:12}}>Comparación de Uso</h3>
                <ResponsiveContainer width="100%" height={140}>
                  <BarChart data={ATHLETE.shoes.map(s=>({name:s.name.replace("ASICS Nimbus ",""),km:s.km,rest:s.maxKm-s.km}))} layout="vertical">
                    <CartesianGrid strokeDasharray="3 3" stroke="#ffffff08"/>
                    <XAxis type="number" tick={{fill:"#6b7280",fontSize:10}}/>
                    <YAxis dataKey="name" type="category" tick={{fill:"#9ca3af",fontSize:11}} width={100}/>
                    <Tooltip content={<TT/>}/>
                    <Bar dataKey="km" name="Km Usados" stackId="a" fill={N.cyan}/>
                    <Bar dataKey="rest" name="Km Restantes" stackId="a" fill="#1f293780" radius={[0,4,4,0]}/>
                  </BarChart>
                </ResponsiveContainer>
              </Card>
            </div>
            );
          })()}

          {/* FOOTER */}
          <div style={{marginTop:40,textAlign:"center",paddingBottom:16}}>
            <p style={{fontSize:"0.625rem",color:"#374151"}}>Strava Analytics Dashboard · {ATHLETE.name} · Generado {new Date().toLocaleDateString("es")}</p>
          </div>
        </div>
      );
    }

    ReactDOM.render(<StravaDashboard/>, document.getElementById("root"));
  </script>
</body>
</html>
