      /* Heatmap scroll */

      /* Cards: reduce padding */

      /* Recharts containers — slightly shorter on mobile */

      /* Shoe projection grid → stack */
      .shoe-stats { grid-template-columns: 1fr !important; gap: 6px !important; }
      /* HR zones pie + legend → stack */
      .hr-zones-grid { grid-template-columns: 1fr !important; }
      /* Metric cards: 2-column on narrow */
      .metric-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
    /* Extra small (< 380px, like iPhone SE) */

      .main-container { padding: 8px !important; }
      .title-name { font-size: 1rem !important; }

    }

    @media (display-mode: standalone) {

    }
