<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#0A0A0A"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>"/>
<title>RUNIA · Mi Entrenamiento</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#0A0A0A;min-height:100vh;color:#FAFAF7;-webkit-font-smoothing:antialiased}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:up .35s ease both}
@media(max-width:600px){.g4{grid-template-columns:1fr 1fr!important}.g3{grid-template-columns:1fr!important}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;

const C={
  coral:"#FF4F4D",vi:"#6E47FF",green:"#00C896",yellow:"#FFD23F",
  bg:"#0A0A0A",s1:"#111115",s2:"#18181d",
  t:"#FAFAF7",sub:"#737380",dim:"rgba(255,255,255,0.15)",
  border:"rgba(255,255,255,0.07)"
};

const f=(n,d=1)=>Number(n||0).toFixed(d);
const mono={fontFamily:"JetBrains Mono,monospace"};

const paceStr=h=>{
  if(!h||h<=0)return"—";
  const m=Math.floor(h);
  return`${m}:${String(Math.round((h-m)*60)).padStart(2,"0")}`;
};
const dayN=d=>{
  const W=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  return W[new Date(d+"T12:00:00").getDay()];
};

const Chip=({color=C.coral,xs,children})=>(
  <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:xs?"2px 7px":"4px 10px",borderRadius:100,fontSize:xs?"0.62rem":"0.7rem",fontWeight:600,letterSpacing:".04em",textTransform:"uppercase",background:color+"22",color,border:`1px solid ${color}44`}}>
    {children}
  </span>
);

const Card=({children,style})=>(
  <div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:16,padding:20,...style}}>
    {children}
  </div>
);

const PBar=({pct,h=5,from=C.coral})=>(
  <div style={{height:h,borderRadius:h/2,background:"rgba(255,255,255,0.06)",overflow:"hidden"}}>
    <div style={{height:"100%",width:`${Math.min(100,Math.max(0,pct))}%`,background:`linear-gradient(90deg,${from},${C.vi})`,borderRadius:h/2,transition:"width .8s ease"}}/>
  </div>
);

const Stat=({icon,val,label,sub,color=C.coral})=>(
  <div style={{background:C.s1,border:`1px solid ${C.border}`,borderRadius:16,padding:"14px 10px",textAlign:"center"}}>
    <div style={{fontSize:"1.25rem",marginBottom:5}}>{icon}</div>
    <div style={{...mono,fontSize:"1.3rem",fontWeight:700,color,lineHeight:1}}>{val}</div>
    {sub&&<div style={{...mono,fontSize:"0.57rem",color:C.dim,marginTop:2}}>{sub}</div>}
    <div style={{fontSize:"0.68rem",color:C.sub,marginTop:6,fontWeight:500}}>{label}</div>
  </div>
);

const SessionCard=({s})=>{
  const done=s.type==="completed";
  return(
    <div style={{padding:12,borderRadius:12,background:done?"rgba(0,200,150,0.04)":C.s2,border:`1px solid ${done?C.green+"33":C.border}`,display:"flex",flexDirection:"column",gap:5}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:"0.6rem",fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:".05em"}}>{dayN(s.date)} {s.date?.slice(8)}</span>
        <span style={{fontSize:"0.68rem",color:done?C.green:C.sub,fontWeight:600}}>{done?"✓":"○"}</span>
      </div>
      <div style={{fontSize:"0.8rem",fontWeight:600,lineHeight:1.3}}>{s.title}</div>
      {s.description&&(
        <div style={{fontSize:"0.68rem",color:C.sub,lineHeight:1.4,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>
          {s.description}
        </div>
      )}
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:1}}>
        {s.distance_planned_km>0&&<Chip color={C.vi} xs>{s.distance_planned_km}km</Chip>}
        {done&&s.distance_actual_km>0&&<Chip color={C.green} xs>{f(s.distance_actual_km)}km real</Chip>}
        {done&&s.tss>0&&<Chip color={C.yellow} xs>TSS {Math.round(s.tss)}</Chip>}
      </div>
    </div>
  );
};

const RunRow=({a,last})=>{
  const p=a.distance_actual_km>0&&a.duration_actual>0?(a.duration_actual*60)/a.distance_actual_km:0;
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:last?"none":`1px solid ${C.border}`}}>
      <div style={{width:34,height:34,borderRadius:10,background:"rgba(0,200,150,0.08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1rem",flexShrink:0}}>🏃</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:"0.78rem",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.title}</div>
        <div style={{fontSize:"0.66rem",color:C.sub}}>{a.date} · TSS {Math.round(a.tss||0)}</div>
      </div>
      <div style={{textAlign:"right",flexShrink:0}}>
        <div style={{...mono,fontSize:"0.82rem",fontWeight:700,color:C.green}}>{f(a.distance_actual_km)}km</div>
        {p>0&&<div style={{...mono,fontSize:"0.64rem",color:C.sub}}>{paceStr(p)}/km</div>}
      </div>
    </div>
  );
};

function Dashboard({d}){
  const{athlete:a,coach_note:cn,current_week:cw,recent_activities:ra=[],stats:st={},milestones:ml=[]}=d;
  const pPct=Math.round((a.phase_week/a.phase_total_weeks)*100);
  const totPct=Math.round(((a.phase-1)*a.phase_total_weeks+a.phase_week)/(a.total_plan_weeks||46)*100);
  const runs=ra.filter(x=>x.sport_type==="run"||/run|hills|interval|easy|long|fondo/i.test(x.title||"")).slice(0,6);
  const tsbColor=st.tsb>=5?C.green:st.tsb>=-10?C.yellow:C.coral;

  return(
    <div className="fade" style={{maxWidth:680,margin:"0 auto",padding:"16px 16px 48px"}}>

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:44,height:44,borderRadius:12,background:`linear-gradient(135deg,${C.coral},${C.vi})`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:"0.88rem",letterSpacing:".04em",flexShrink:0}}>
            {a.initials}
          </div>
          <div>
            <div style={{fontSize:"1rem",fontWeight:800}}>{a.name}</div>
            <div style={{display:"flex",gap:5,marginTop:3,flexWrap:"wrap"}}>
              <Chip color={C.vi} xs>{a.level}</Chip>
              <Chip color={C.coral} xs>{a.goal}</Chip>
            </div>
          </div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:"1.1rem",fontWeight:900,letterSpacing:"-0.03em"}}>
            RUN<span style={{color:C.coral}}>I</span><span style={{color:C.vi}}>A</span>
          </div>
          <div style={{fontSize:"0.55rem",color:C.sub}}>Corre con inteligencia.</div>
        </div>
      </div>

      {cn&&(
        <Card style={{marginBottom:10,background:"linear-gradient(135deg,rgba(110,71,255,.08),rgba(255,79,77,.04))",borderColor:"rgba(110,71,255,.2)"}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:8}}>
            <div style={{width:34,height:34,borderRadius:"50%",background:`linear-gradient(135deg,${C.coral},${C.vi})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.9rem",flexShrink:0}}>💬</div>
            <div>
              <div style={{fontSize:"0.6rem",fontWeight:700,color:C.vi,textTransform:"uppercase",letterSpacing:".05em",marginBottom:3}}>Nota del Coach · {cn.week_label}</div>
              {cn.focus&&<Chip color={C.coral} xs>{cn.focus}</Chip>}
            </div>
          </div>
          {cn.title&&<div style={{fontSize:"0.9rem",fontWeight:700,marginBottom:6}}>{cn.emoji||"🏃"} {cn.title}</div>}
          <div style={{fontSize:"0.8rem",color:"#8a8a9a",lineHeight:1.7}}>{cn.message}</div>
          <div style={{marginTop:8,fontSize:"0.63rem",color:C.sub,fontStyle:"italic"}}>— Equipo RUNIA · runiacoach.com</div>
        </Card>
      )}

      <div className="g4" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:10}}>
        <Stat icon="🧠" val={f(st.ctl||0,0)} sub="CTL" label="Forma" color={C.vi}/>
        <Stat icon="⚡" val={st.tsb>0?`+${f(st.tsb,0)}`:f(st.tsb,0)} sub="TSB" label="Energía" color={tsbColor}/>
        <Stat icon="🛣️" val={f(st.monthly_km||0,0)} sub="km/mes" label="Volumen" color={C.coral}/>
        <Stat icon="🔥" val={`${st.consistency_pct||0}%`} sub="adherencia" label="Constancia" color={C.yellow}/>
      </div>

      <Card style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div>
            <div style={{fontSize:"0.6rem",fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:".05em",marginBottom:3}}>Fase Actual</div>
            <div style={{fontSize:"0.9rem",fontWeight:700}}>Fase {a.phase} — {a.phase_name}</div>
          </div>
          <Chip color={C.vi}>S{a.phase_week} / {a.phase_total_weeks}</Chip>
        </div>
        <div style={{marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontSize:"0.65rem",color:C.sub}}>Esta fase</span>
            <span style={{...mono,fontSize:"0.65rem",color:C.vi}}>{pPct}%</span>
          </div>
          <PBar pct={pPct} from={C.vi}/>
        </div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
            <span style={{fontSize:"0.65rem",color:C.sub}}>Camino a {a.goal}</span>
            <span style={{...mono,fontSize:"0.65rem",color:C.coral}}>{totPct}%</span>
          </div>
          <PBar pct={totPct} from={C.coral}/>
        </div>
        {ml.length>0&&(
          <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${C.border}`}}>
            {ml.map((m,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0"}}>
                <div style={{width:22,height:22,borderRadius:"50%",background:m.done?C.green+"22":"transparent",border:`2px solid ${m.done?C.green:C.sub}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"0.6rem",flexShrink:0,color:m.done?C.green:C.sub}}>
                  {m.done?"✓":i+1}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:"0.76rem",fontWeight:600,color:m.done?C.t:C.sub}}>{m.label}</div>
                  <div style={{fontSize:"0.64rem",color:m.done?C.green:C.sub}}>{m.value}{m.date&&` · ${m.date}`}</div>
                </div>
              </div>
            ))}
          </div>
        )}
      </Card>

      {cw?.sessions?.length>0&&(
        <Card style={{marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:"0.6rem",fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:".05em"}}>Esta Semana</div>
            <span style={{fontSize:"0.66rem",color:C.sub}}>{cw.start} → {cw.end}</span>
          </div>
          <div className="g3" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {cw.sessions.map((s,i)=><SessionCard key={i} s={s}/>)}
          </div>
        </Card>
      )}

      {runs.length>0&&(
        <Card>
          <div style={{fontSize:"0.6rem",fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:".05em",marginBottom:12}}>
            Últimas Corridas — 30 días
          </div>
          {runs.map((r,i)=><RunRow key={i} a={r} last={i===runs.length-1}/>)}
        </Card>
      )}

      <div style={{textAlign:"center",marginTop:16,fontSize:"0.58rem",color:"rgba(255,255,255,0.07)"}}>
        runiacoach.com · {new Date().toLocaleDateString("es-DO",{day:"2-digit",month:"short",year:"numeric"})}
      </div>

    </div>
  );
}

const Loader=()=>(
  <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:14}}>
    <div style={{width:30,height:30,border:`3px solid rgba(255,255,255,0.07)`,borderTopColor:"#FF4F4D",borderRadius:"50%",animation:"spin 1s linear infinite"}}/>
    <div style={{fontSize:"0.74rem",color:"#737380"}}>Cargando plan...</div>
  </div>
);

function App(){
  const[data,setData]=useState(null);
  const[err,setErr]=useState(false);
  useEffect(()=>{
    const id=new URLSearchParams(location.search).get("id")||"lissette";
    fetch(`./data/${id}.json`)
      .then(r=>{if(!r.ok)throw 0;return r.json();})
      .then(setData)
      .catch(()=>setErr(true));
  },[]);
  if(err)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:8,color:"#737380"}}>
      <div style={{fontSize:"2rem"}}>⚠️</div>
      <div style={{fontSize:"0.8rem"}}>Perfil no encontrado</div>
      <div style={{fontSize:"0.66rem",color:"rgba(255,255,255,0.2)"}}>Usa ?id=nombre en la URL</div>
    </div>
  );
  if(!data)return<Loader/>;
  return<Dashboard d={data}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
